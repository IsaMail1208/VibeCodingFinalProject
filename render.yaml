services:
  - type: web
    name: vibe-chat
    runtime: python
    plan: free
    autoDeploy: true
    healthCheckPath: /api/health
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHONUNBUFFERED
        value: "1"
